<!-- QUIZ CONTENT -->
<div class="container mt-5">

  <h3 class="text-center mb-4">Find Your Program Match</h3>

  <div class="card p-4 shadow no-hover">

    <form id="quizForm">

      <label>1. What type of work excites you most?</label>
      <select id="q1" class="form-select mb-3">
        <option value="code">Writing code / building apps</option>
        <option value="design">Designing visuals</option>
        <option value="data">Working with data</option>
        <option value="systems">Managing systems</option>
        <option value="creative">Creative storytelling</option>
      </select>

      <label>2. Preferred environment?</label>
      <select id="q2" class="form-select mb-3">
        <option value="team">Team collaboration</option>
        <option value="solo">Independent work</option>
        <option value="fast">Fast-paced projects</option>
        <option value="structured">Structured tasks</option>
      </select>

      <label>3. What sounds more interesting?</label>
      <select id="q3" class="form-select mb-3">
        <option value="web">Web applications</option>
        <option value="game">Video games</option>
        <option value="cyber">Hacking & security</option>
        <option value="ux">User experience</option>
        <option value="network">Networks & servers</option>
      </select>

      <label>4. Your strongest skill?</label>
      <select id="q4" class="form-select mb-3">
        <option value="logic">Logical thinking</option>
        <option value="visual">Visual creativity</option>
        <option value="problem">Problem solving</option>
        <option value="communication">Communication</option>
      </select>

      <label>5. Favorite type of project?</label>
      <select id="q5" class="form-select mb-3">
        <option value="apps">Apps & software</option>
        <option value="games">Games & simulations</option>
        <option value="media">Movies / animation</option>
        <option value="security">Security systems</option>
        <option value="data">Data analysis</option>
      </select>

      <label>6. You prefer:</label>
      <select id="q6" class="form-select mb-3">
        <option value="build">Building things</option>
        <option value="analyze">Analyzing information</option>
        <option value="design">Designing interfaces</option>
        <option value="protect">Protecting systems</option>
      </select>

      <label>7. What sounds more fun?</label>
      <select id="q7" class="form-select mb-3">
        <option value="game">Creating games</option>
        <option value="web">Building websites</option>
        <option value="animation">Animating characters</option>
        <option value="data">Finding patterns in data</option>
      </select>

      <label>8. Work style preference:</label>
      <select id="q8" class="form-select mb-3">
        <option value="creative">Creative freedom</option>
        <option value="structured">Clear instructions</option>
        <option value="technical">Technical challenges</option>
        <option value="social">Helping users</option>
      </select>

      <label>9. Most interesting field:</label>
      <select id="q9" class="form-select mb-3">
        <option value="cyber">Cybersecurity</option>
        <option value="ux">UX/UI Design</option>
        <option value="network">Networking</option>
        <option value="it">IT Systems</option>
      </select>

      <label>10. Long-term goal:</label>
      <select id="q10" class="form-select mb-3">
        <option value="build">Build software products</option>
        <option value="design">Design experiences</option>
        <option value="analyze">Work with data</option>
        <option value="secure">Protect systems</option>
      </select>

        <button type="submit" class="btn acc-btn w-100"
          data-bs-toggle="tooltip"
          title="Submit your answers to get your program result">
          Get My Result
        </button>


    </form>
    <div id="resultBox" class="mt-4 text-center"></div>
  </div>
</div>
